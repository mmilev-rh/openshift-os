OPENSHIFT_VERSION=4.23
IMAGE_FROM=registry.ci.openshift.org/coreos/rhel-coreos-base:9.8

# The streamclass is based on the rhel/centos major version. The
# io.openshift.os.streamclass label is used by the MCO to later
# select the right image stream when multiple major versions coexist.
STREAM_CLASS=rhel-9

# Used by the generate-labels script
IMAGE_NAME=openshift/ose-rhel-coreos-9
IMAGE_CPE=cpe:/a:redhat:openshift:4.23::el9

# The names of the yum repos to use for the node image build.
YUM_REPO_NAMES=rhel-9.8-baseos,rhel-9.8-appstream,rhel-9.8-early-kernel,rhel-9.8-fast-datapath,rhel-9.8-server-ose-4.23
